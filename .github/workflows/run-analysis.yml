name: AI Trend Analyzer and Evaluator

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # NEW: Schedule the workflow to run automatically
  schedule:
    # 14:30 UTC is exactly 8:00 PM IST
    - cron: '30 14 * * *'

# Give the action permission to push commits back to the repo
permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # fetch-depth: 0 ensures we get the full history so we can push back
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
          # If you have a requirements.txt, uncomment the next line:
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p stock-analyser/outputs

      - name: Run Trend Analyzer
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python analyzer.py --trending

      - name: Run Evaluator (Sends to Telegram)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/data/alternative/evaluator.py

      - name: Commit and Push Output Files
        run: |
          # Set up the Git user as a GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific outputs folder
          git add stock-analyser/outputs/
          
          # Commit the changes. The || echo part prevents the workflow from failing if no files actually changed today.
          # [skip ci] is essential so this push doesn't trigger another run!
          git commit -m "Auto-update prediction files [skip ci]" || echo "No changes to commit"
          
          # Push the changes back to the main branch
          git push origin main

      - name: Upload Output Files as Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: stock-analyser-outputs
          path: stock-analyser/outputs/
          retention-days: 7