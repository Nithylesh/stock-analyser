name: AI Trend Analyzer and Evaluator

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 14 * * *'

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
          # pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p stock-analyser/outputs

      - name: Run Trend Analyzer
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          python analyzer.py --trending

      - name: Run Evaluator (Sends to Telegram)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/data/alternative/evaluator.py

      - name: Commit and Push Output Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-analyser/outputs/
          git commit -m "Auto-update prediction files [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload Output Files as Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: stock-analyser-outputs
          path: stock-analyser/outputs/
          retention-days: 7